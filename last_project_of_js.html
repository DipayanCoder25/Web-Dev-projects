<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bank App · Income & Expense tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      background: linear-gradient(145deg, #e6e9f0 0%, #f2f5fa 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
    }
    .bank-card {
      max-width: 700px;
      width: 100%;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 2.5rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12), 0 8px 24px rgba(0, 20, 60, 0.08), inset 0 1px 1px rgba(255,255,255,0.6);
      padding: 2rem 1.8rem;
      border: 1px solid rgba(255,255,255,0.5);
      transition: all 0.2s ease;
    }
    h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #0b1b33;
      margin-bottom: 1.2rem;
      border-bottom: 2px solid rgba(0,40,100,0.08);
      padding-bottom: 0.6rem;
    }
    h1 span {
      background: #1a3b5c;
      color: white;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.2rem 0.9rem;
      border-radius: 40px;
      letter-spacing: 0.3px;
      margin-left: 0.75rem;
    }
    .balance-panel {
      background: linear-gradient(115deg, #132b47, #1f3e61);
      border-radius: 2rem;
      padding: 1.5rem 1.8rem;
      margin-bottom: 2rem;
      color: white;
      box-shadow: 0 10px 20px rgba(0,20,40,0.25);
    }
    .balance-label {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      opacity: 0.8;
      margin-bottom: 0.3rem;
    }
    .balance-amount {
      font-size: 3.5rem;
      font-weight: 650;
      line-height: 1.1;
      display: flex;
      align-items: baseline;
      gap: 0.2rem;
    }
    .balance-amount small {
      font-size: 1.5rem;
      font-weight: 400;
      opacity: 0.7;
    }
    .income-expense-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
      margin-bottom: 2.2rem;
    }
    .stat-card {
      background: white;
      border-radius: 1.8rem;
      padding: 1.4rem 1.2rem;
      box-shadow: 0 6px 14px rgba(0,0,0,0.02);
      border: 1px solid rgba(0,0,0,0.02);
      transition: transform 0.15s;
      backdrop-filter: blur(5px);
    }
    .stat-card:hover {
      transform: translateY(-3px);
    }
    .stat-title {
      font-size: 0.9rem;
      color: #52677a;
      font-weight: 500;
      letter-spacing: 0.3px;
      margin-bottom: 0.3rem;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .stat-number {
      font-size: 2.2rem;
      font-weight: 650;
      line-height: 1.2;
    }
    .income-num { color: #0f7b4e; }
    .expense-num { color: #bc3f4a; }
    .transaction-section {
      background: rgba(255,255,255,0.5);
      border-radius: 1.8rem;
      padding: 1.5rem 0.2rem 0.5rem 1.2rem;
      margin-bottom: 2rem;
      backdrop-filter: blur(5px);
    }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-right: 1.2rem;
      margin-bottom: 1rem;
    }
    .section-header h3 {
      font-size: 1.3rem;
      font-weight: 600;
      color: #12263a;
    }
    .action-btns {
      display: flex;
      gap: 0.6rem;
    }
    .icon-btn {
      background: rgba(255,255,255,0.8);
      border: none;
      border-radius: 2rem;
      padding: 0.4rem 0.9rem;
      font-size: 0.8rem;
      font-weight: 500;
      color: #1f3e61;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.03);
      border: 1px solid rgba(0,0,0,0.04);
      transition: all 0.1s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .icon-btn:hover {
      background: white;
      box-shadow: 0 6px 12px rgba(0,20,50,0.1);
      border-color: #a0b8d0;
    }
    .transactions-list {
      max-height: 280px;
      overflow-y: auto;
      padding-right: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .transaction-item {
      background: white;
      border-radius: 1.5rem;
      padding: 0.8rem 1rem 0.8rem 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
      border-left: 6px solid;
      transition: 0.1s;
      border-left-color: #cbd5e1;
    }
    .transaction-item.income-item {
      border-left-color: #1e8f5c;
    }
    .transaction-item.expense-item {
      border-left-color: #d34d5e;
    }
    .tx-info {
      display: flex;
      flex-direction: column;
    }
    .tx-desc {
      font-weight: 600;
      font-size: 1rem;
      color: #12263a;
    }
    .tx-meta {
      font-size: 0.7rem;
      color: #6f8a9f;
      letter-spacing: 0.2px;
    }
    .tx-amount {
      font-weight: 650;
      font-size: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .tx-amount.positive { color: #0f7b4e; }
    .tx-amount.negative { color: #bc3f4a; }
    .delete-btn {
      background: none;
      border: none;
      font-size: 1.4rem;
      line-height: 1;
      color: #9aafc4;
      cursor: pointer;
      padding: 0 4px;
      border-radius: 20px;
      transition: all 0.1s;
    }
    .delete-btn:hover {
      color: #bc3f4a;
      background: rgba(188,63,74,0.1);
      transform: scale(1.2);
    }
    .empty-message {
      text-align: center;
      color: #7a8f9f;
      padding: 1.8rem 1rem;
      font-style: italic;
      background: rgba(255,255,255,0.3);
      border-radius: 2rem;
    }
    .add-transaction {
      background: white;
      border-radius: 2rem;
      padding: 1.6rem 1.2rem 1.2rem 1.2rem;
      box-shadow: 0 6px 16px rgba(0,0,0,0.02);
      border: 1px solid rgba(255,255,255,0.8);
      margin-top: 1rem;
    }
    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      align-items: flex-end;
    }
    .input-group {
      flex: 2 1 180px;
    }
    .input-group label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      color: #47647c;
      margin-bottom: 0.2rem;
      letter-spacing: 0.3px;
    }
    .input-group input {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 1.5px solid #e2eaf1;
      border-radius: 1.2rem;
      font-size: 1rem;
      background: #f9fcff;
      transition: 0.15s;
    }
    .input-group input:focus {
      outline: none;
      border-color: #1f3e61;
      background: white;
      box-shadow: 0 0 0 3px rgba(31,62,97,0.1);
    }
    .radio-group {
      flex: 1 1 140px;
      display: flex;
      align-items: center;
      gap: 1rem;
      background: #f2f6fa;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      height: fit-content;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 0.2rem;
      font-weight: 500;
      color: #1f3e61;
      cursor: pointer;
    }
    .radio-group input[type="radio"] {
      accent-color: #1f3e61;
      width: 16px;
      height: 16px;
      margin-right: 0.2rem;
    }
    .add-btn {
      background: #1f3e61;
      border: none;
      color: white;
      font-weight: 600;
      padding: 0.8rem 1.8rem;
      border-radius: 2rem;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(0,40,80,0.2);
      transition: all 0.15s;
      border: 1px solid #1f3e61;
      flex: 0 0 auto;
    }
    .add-btn:hover {
      background: #122b44;
      transform: scale(1.02);
      box-shadow: 0 12px 22px rgba(0,30,70,0.25);
    }
    .footer-note {
      font-size: 0.7rem;
      text-align: right;
      color: #7b93aa;
      margin-top: 1.2rem;
      opacity: 0.7;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="bank-card">
    <h1>
      💳 myBank
      <span>tracker</span>
    </h1>
    <!-- balance card -->
    <div class="balance-panel">
      <div class="balance-label">YOUR BALANCE</div>
      <div class="balance-amount">
        $<span id="balanceValue">0.00</span>
        <small>USD</small>
      </div>
    </div>

    <!-- income & expense cards -->
    <div class="income-expense-grid">
      <div class="stat-card">
        <div class="stat-title">📈 INCOME</div>
        <div class="stat-number income-num" id="totalIncome">$0.00</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">📉 EXPENSE</div>
        <div class="stat-number expense-num" id="totalExpense">$0.00</div>
      </div>
    </div>

    <!-- transaction history -->
    <div class="transaction-section">
      <div class="section-header">
        <h3>📋 recent activity</h3>
        <div class="action-btns">
          <button class="icon-btn" id="resetDemoBtn" title="load sample data">📋 demo</button>
          <button class="icon-btn" id="clearAllBtn" title="remove all transactions">🗑️ clear</button>
        </div>
      </div>
      <div class="transactions-list" id="transactionsList">
        <!-- dynamic items will appear here -->
        <div class="empty-message">No transactions yet. Add income or expense.</div>
      </div>
    </div>

    <!-- add new transaction -->
    <div class="add-transaction">
      <div style="font-weight:600; margin-bottom:1rem; color:#1f3e61;">+ new entry</div>
      <div class="form-row">
        <div class="input-group">
          <label>description</label>
          <input type="text" id="descInput" placeholder="e.g. Salary, Groceries..." autocomplete="off">
        </div>
        <div class="input-group">
          <label>amount ($)</label>
          <input type="number" id="amountInput" step="0.01" min="0.01" placeholder="0.00">
        </div>
        <div class="radio-group">
          <label><input type="radio" name="txType" value="income" checked> 💰 Income</label>
          <label><input type="radio" name="txType" value="expense"> 💸 Expense</label>
        </div>
        <button class="add-btn" id="addTransactionBtn">add</button>
      </div>
    </div>
    <div class="footer-note">↓ expenses show in red · click ✖ to delete</div>
  </div>

  <script>
    (function() {
      // ----- DOM elements -----
      const balanceEl = document.getElementById('balanceValue');
      const totalIncomeEl = document.getElementById('totalIncome');
      const totalExpenseEl = document.getElementById('totalExpense');
      const transactionsListEl = document.getElementById('transactionsList');
      const descInput = document.getElementById('descInput');
      const amountInput = document.getElementById('amountInput');
      const addBtn = document.getElementById('addTransactionBtn');
      const resetDemoBtn = document.getElementById('resetDemoBtn');
      const clearAllBtn = document.getElementById('clearAllBtn');

      // ----- data & storage key -----
      const STORAGE_KEY = 'bankApp_transactions';
      let transactions = [];

      // ----- helper: generate unique id (timestamp + random) -----
      function generateId() {
        return Date.now() + Math.floor(Math.random() * 10000);
      }

      // ----- default demo transactions (used on first load or reset) -----
      function createDemoTransactions() {
        const now = Date.now();
        return [
          { id: now - 1000, text: 'Salary (March)', amount: 5200.00 },
          { id: now - 2000, text: 'Rent / flat', amount: -1420.00 },
          { id: now - 3000, text: 'Freelance project', amount: 870.50 },
          { id: now - 4000, text: 'Groceries', amount: -215.30 },
          { id: now - 5000, text: 'Coffee & lunch', amount: -48.90 },
          { id: now - 6000, text: 'Dividend', amount: 124.60 }
        ];
      }

      // ----- save to localStorage -----
      function saveToStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
      }

      // ----- load from localStorage (or init with demo) -----
      function loadFromStorage() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
          try {
            const parsed = JSON.parse(stored);
            // basic validation: ensure it's an array
            transactions = Array.isArray(parsed) ? parsed : createDemoTransactions();
          } catch {
            transactions = createDemoTransactions();
          }
        } else {
          transactions = createDemoTransactions();
        }
        // make sure every item has a valid numeric id (just in case)
        transactions = transactions.filter(t => t && typeof t === 'object').map(t => {
          if (!t.id || isNaN(t.id)) t.id = generateId();
          return t;
        });
      }

      // ----- compute totals and render UI -----
      function render() {
        // calculate totals
        let balance = 0, incomeTotal = 0, expenseTotal = 0;
        transactions.forEach(t => {
          const amt = Number(t.amount) || 0;
          balance += amt;
          if (amt > 0) incomeTotal += amt;
          else if (amt < 0) expenseTotal += Math.abs(amt);
        });

        // update header numbers
        balanceEl.textContent = balance.toFixed(2);
        totalIncomeEl.textContent = `$${incomeTotal.toFixed(2)}`;
        totalExpenseEl.textContent = `$${expenseTotal.toFixed(2)}`;

        // render transaction list
        if (transactions.length === 0) {
          transactionsListEl.innerHTML = `<div class="empty-message">✨ No transactions yet. Add income or expense.</div>`;
          return;
        }

        // sort by id (newer first, assuming id is timestamp-like)
        const sorted = [...transactions].sort((a,b) => b.id - a.id);

        let htmlString = '';
        sorted.forEach(t => {
          const amountNum = Number(t.amount) || 0;
          const isIncome = amountNum > 0;
          const sign = isIncome ? '+' : '-';
          const amountAbs = Math.abs(amountNum).toFixed(2);
          const itemClass = isIncome ? 'income-item' : 'expense-item';
          const amountClass = isIncome ? 'positive' : 'negative';
          // simple date-like from id (just for style)
          const dateTip = new Date(t.id).toLocaleDateString('en-US', { month:'numeric', day:'numeric' });
          htmlString += `
            <div class="transaction-item ${itemClass}" data-id="${t.id}">
              <div class="tx-info">
                <span class="tx-desc">${escapeHtml(t.text) || '??'}</span>
                <span class="tx-meta">${dateTip}</span>
              </div>
              <div class="tx-amount ${amountClass}">
                ${sign}$${amountAbs}
                <button class="delete-btn" data-id="${t.id}" title="delete">✖</button>
              </div>
            </div>
          `;
        });
        transactionsListEl.innerHTML = htmlString;

        // simple escape for description (avoid XSS)
        function escapeHtml(unsafe) {
          if (!unsafe) return '';
          return unsafe
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
        }
      }

      // ----- add new transaction from form -----
      function addTransaction() {
        const description = descInput.value.trim();
        const amountRaw = amountInput.value.trim();
        const isIncome = document.querySelector('input[name="txType"]:checked').value === 'income';

        if (!description) {
          alert('Please enter a description');
          return;
        }
        const amountNum = parseFloat(amountRaw);
        if (isNaN(amountNum) || amountNum <= 0) {
          alert('Amount must be a positive number (greater than 0)');
          return;
        }

        const signedAmount = isIncome ? amountNum : -amountNum;
        const newTransaction = {
          id: generateId(),
          text: description,
          amount: signedAmount
        };

        transactions.push(newTransaction);
        saveToStorage();
        render();

        // clear inputs (keep radio unchanged)
        descInput.value = '';
        amountInput.value = '';
        descInput.focus();
      }

      // ----- delete transaction (event delegation) -----
      function handleListClick(e) {
        const deleteBtn = e.target.closest('.delete-btn');
        if (!deleteBtn) return;
        const idStr = deleteBtn.getAttribute('data-id');
        if (!idStr) return;
        const id = Number(idStr);
        transactions = transactions.filter(t => t.id !== id);
        saveToStorage();
        render();
      }

      // ----- reset to demo data -----
      function resetToDemo() {
        transactions = createDemoTransactions();
        saveToStorage();
        render();
      }

      // ----- clear all transactions -----
      function clearAll() {
        if (transactions.length > 0 && confirm('Delete all transactions?')) {
          transactions = [];
          saveToStorage();
          render();
        }
      }

      // ----- initialise & attach events -----
      function init() {
        loadFromStorage();
        render();

        // event listeners
        addBtn.addEventListener('click', addTransaction);
        transactionsListEl.addEventListener('click', handleListClick);
        resetDemoBtn.addEventListener('click', resetToDemo);
        clearAllBtn.addEventListener('click', clearAll);

        // allow Enter key on inputs (quick add)
        [descInput, amountInput].forEach(input => {
          input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
              e.preventDefault();
              addBtn.click();
            }
          });
        });
      }

      // start everything
      init();
    })();
  </script>
</body>
</html>
